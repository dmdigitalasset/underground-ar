<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>UNDERGROUND · AR</title>
  <!--
    UNDERGROUND AR Launcher (demo) — viewer.html?model=pizza
    Pakai mesin model-viewer untuk AR (pilih jalur terbaik per device:
    WebXR → Scene Viewer → Quick Look) karena intent Scene Viewer manual
    tidak andal. 3D canvas ada di belakang, DITUTUP splash overlay —
    user hanya melihat tombol "Enter AR" → tap → kamera.
    ar-scale="fixed" = skala terkunci 1:1 (model sudah ukuran asli).
    Kalau AR tidak tersedia di device → overlay dibuka, fallback 3D.
  -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    :root { --ink: #0a0908; --gold: #d4a857; --bone: #f5ede0; --mute: #b8b0a4; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { background: var(--ink); color: var(--bone); font-family: Georgia, serif; height: 100dvh; }
    model-viewer {
      width: 100%; height: 100dvh;
      background: radial-gradient(ellipse at center, #1c1814 0%, var(--ink) 80%);
      --progress-bar-color: var(--gold);
    }
    /* Splash menutupi 3D viewer — user tidak melihat 3D kecuali fallback */
    #splash {
      position: fixed; inset: 0; z-index: 10;
      background: radial-gradient(ellipse at center, #1c1814 0%, var(--ink) 80%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 24px; transition: opacity 0.3s;
    }
    .brand { font-size: 11px; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; }
    h1 { font-size: 26px; font-weight: 400; margin: 10px 0 26px; }
    .ar-button {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--gold); color: var(--ink);
      border: 1px solid rgba(255,240,200,0.6); border-radius: 999px;
      padding: 16px 34px; font-family: inherit; font-size: 17px; font-weight: 700;
      letter-spacing: 0.4px; cursor: pointer;
      box-shadow: 0 0 28px rgba(212,168,87,0.4);
      animation: pulse 2.8s ease-in-out infinite;
    }
    .ar-button:disabled { opacity: 0.5; animation: none; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .hint { color: var(--mute); font-size: 12px; margin-top: 16px; font-family: system-ui, sans-serif; max-width: 320px; line-height: 1.6; }
    .hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    const MODELS = {
      'pizza':          { title: 'Pizza',               glb: 'models/pizza.glb',          usdz: 'models/pizza.usdz' },
      'choc-croissant': { title: 'Chocolate Croissant', glb: 'models/choc-croissant.glb', usdz: 'models/choc-croissant.usdz' },
      'purple-cake':    { title: 'Purple Velvet Cake',  glb: 'models/purple-cake.glb',    usdz: 'models/purple-cake.usdz' },
      'steak-potatoes': { title: 'Steak & Potatoes',    glb: 'models/steak-potatoes.glb', usdz: 'models/steak-potatoes.usdz' },
    };

    const params = new URLSearchParams(location.search);
    const key = params.get('model');
    const force3d = params.get('view') === '3d';
    const model = MODELS[key];
    const root = document.getElementById('root');

    if (!model) {
      root.innerHTML = '<div id="splash"><div class="brand">Underground</div>' +
        '<h1>Model tidak ditemukan</h1><p class="hint">Model "' + (key ?? '') + '" tidak terdaftar. Cek parameter ?model= pada URL.</p></div>';
    } else if (!force3d && /iPad|iPhone|iPod/.test(navigator.userAgent)) {
      // ─── iOS: anchor rel="ar" ASLI (jalur resmi Apple) ───
      // Tap jari langsung pada <a rel="ar"> = Quick Look terbuka LANGSUNG
      // mode AR kamera, TANPA dialog "Open this 3D model?", dan fragment
      // #allowsContentScaling=0 dipatuhi (skala terkunci 1:1).
      // Syarat Apple: anchor harus berisi tepat satu <img> — maka tombol
      // emasnya digambar sebagai SVG yang dibungkus jadi <img>.
      document.title = 'UNDERGROUND · ' + model.title;
      const usdzHref = model.usdz + '#allowsContentScaling=0';
      const btnSvg =
        '<svg xmlns="http://www.w3.org/2000/svg" width="240" height="58">' +
        '<rect x="1" y="1" width="238" height="56" rx="28" fill="#d4a857" stroke="#fff0c8" stroke-opacity="0.6"/>' +
        '<text x="120" y="36" font-family="Georgia, serif" font-size="19" font-weight="bold" fill="#0a0908" text-anchor="middle">◇  Enter AR</text>' +
        '</svg>';
      root.innerHTML = `
        <div id="splash">
          <div class="brand">Underground</div>
          <h1>${model.title}</h1>
          <a rel="ar" href="${usdzHref}"><img src="data:image/svg+xml,${encodeURIComponent(btnSvg)}" width="240" height="58" alt="Enter AR" style="display:block"/></a>
          <p class="hint">Skala terkunci 1:1 (ukuran asli) — arahkan kamera ke meja Anda.
            <br/><a href="?model=${key}&view=3d" style="color:#d4a857">lihat 3D biasa</a></p>
        </div>`;
    } else {
      document.title = 'UNDERGROUND · ' + model.title;
      root.innerHTML = `
        <model-viewer id="mv"
          src="${model.glb}" ios-src="${model.usdz}" alt="${model.title}"
          ar ar-modes="scene-viewer webxr quick-look" ar-scale="fixed"
          camera-controls auto-rotate shadow-intensity="1" exposure="1.05" loading="eager">
        </model-viewer>
        <div id="splash">
          <div class="brand">Underground</div>
          <h1>${model.title}</h1>
          <button class="ar-button" id="enterAr" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
              <path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/>
            </svg>
            <span id="btnLabel">Loading…</span>
          </button>
          <p class="hint" id="hint">Menyiapkan model…</p>
        </div>`;

      const mv = document.getElementById('mv');
      const splash = document.getElementById('splash');
      const btn = document.getElementById('enterAr');
      const btnLabel = document.getElementById('btnLabel');
      const hint = document.getElementById('hint');

      const HINT_READY =
        'Skala terkunci 1:1 (ukuran asli). Setelah kamera terbuka, ' +
        'gerakkan HP perlahan ke arah meja sampai objek menempel.';

      mv.addEventListener('load', () => {
        if (mv.canActivateAR) {
          btn.disabled = false;
          btnLabel.textContent = 'Enter AR';
          hint.textContent = HINT_READY;
        } else {
          // Device tanpa AR sama sekali → fallback 3D viewer
          splash.classList.add('hidden');
          setTimeout(() => splash.remove(), 400);
        }
      });

      btn.addEventListener('click', () => {
        mv.activateAR();
      });

      mv.addEventListener('ar-status', (e) => {
        if (e.detail.status === 'session-started' || e.detail.status === 'object-placed') {
          // AR berjalan → splash disembunyikan (TIDAK dihapus)
          splash.classList.add('hidden');
        } else if (e.detail.status === 'not-presenting') {
          // Keluar dari AR → KEMBALI ke layar Enter AR, bukan ke 3D
          splash.classList.remove('hidden');
          hint.textContent = HINT_READY;
        } else if (e.detail.status === 'failed') {
          splash.classList.remove('hidden');
          hint.textContent =
            'AR gagal dimulai — pastikan "Google Play Services for AR" terinstall dari Play Store, lalu tap Enter AR lagi.';
        }
      });
    }
  </script>
</body>
</html>
